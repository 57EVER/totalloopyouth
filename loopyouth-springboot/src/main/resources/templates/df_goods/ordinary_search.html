<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<body>
<th:block layout:fragment="center_body">

    <div class="navbar_con">
        <div class="navbar clearfix">
            <div class="subnav_con fl">
                <h1>全部商品分类</h1>
                <span></span>
                <ul class="subnav">
                    <li><a href="/list1_1_1/" class="fruit">书籍</a></li>
                    <li><a href="/list2_1_1/" class="seafood">家电</a></li>
                    <li><a href="/list3_1_1/" class="meet">衣物</a></li>
                    <li><a href="/list4_1_1/" class="egg">出行</a></li>
                    <li><a href="/list5_1_1/" class="vegetables">乐器</a></li>
                    <li><a href="/list6_1_1/" class="ice">智能</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="search_result">
        <div class="search_alert" th:if="${search_status == 0}">
            <p>抱歉，没有找到相关的商品，请换个关键词试试吧！</p>
        </div>

        <div class="goods_type_list clearfix" th:if="${search_status != 0}">
            <ul class="goods_list fl">
                <li th:each="goods : ${page.content}">
                    <a th:href="@{/detail/{id}/(id=${goods.id})}">
                        <img th:src="@{/media/{pic}(pic=${goods.gpic})}">
                    </a>
                    <h4>
                        <a th:href="@{/detail/{id}/(id=${goods.id})}" th:text="${goods.gtitle}"></a>
                    </h4>
                    <div class="prize">￥ <span th:text="${goods.gprice}"></span></div>
                    <div class="unit">
                        <span>卖家：</span>
                        <span th:text="${goods.gunit}"></span>
                    </div>
                    <a class="add_cart" th:if="${session.user_name != null}"
                       th:href="@{/cart/add{gid}_1/(gid=${goods.id})}">加入购物车</a>
                    <a class="add_cart" th:unless="${session.user_name != null}"
                       th:href="@{/user/login/}">加入购物车</a>
                </li>
            </ul>
        </div>

        <div class="pagenation" th:if="${search_status != 0 && page.totalPages > 1}">
            <a th:if="${page.hasPrevious()}"
               th:href="@{/search(q=${param.q},pindex=${page.number})}">
                &lt;上一页
            </a>
            <th:block th:each="pnum : ${#numbers.sequence(1, page.totalPages)}">
                <a th:href="@{/search(q=${param.q},pindex=${pnum})}"
                   th:text="${pnum}"
                   th:classappend="${pnum == page.number + 1} ? 'active' : ''"></a>
            </th:block>
            <a th:if="${page.hasNext()}"
               th:href="@{/search(q=${param.q},pindex=${page.number + 2})}">
                下一页&gt;
            </a>
        </div>
    </div>

</th:block>
</body>
</html>
