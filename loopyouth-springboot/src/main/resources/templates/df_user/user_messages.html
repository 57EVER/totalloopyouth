<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<body>
<th:block layout:fragment="center_body">
    <div class="main_con clearfix">
        <div class="left_menu_con1 clearfix">
            <h3>MESSAGES</h3>
            <div class="information clearfix">
                <a th:href="@{/user/myself_information/}"><img th:src="@{/media/{logo}(logo=${user.ulogo})}" alt="" style="width:100%;height:150px;object-fit:cover;border-radius:8px"></a>
            </div>
            <ul>
                <th:block th:each="person : ${persons}">
                    <th:block th:each="img : ${imgs}">
                        <li th:if="${person[0] == img.uname and person[1] == false}">
                            <a style="background:var(--gray-100);border:1.5px solid var(--black);font-weight:600" th:href="@{/user/person_message/(username=${person[0]})}">
                                <img th:src="@{/media/{logo}(logo=${img.ulogo})}" style="width:28px;height:28px;border-radius:50%;object-fit:cover" alt="">
                                <span th:text="${img.uname}"></span>
                            </a>
                        </li>
                        <li th:if="${person[0] == img.uname and person[1] == true}">
                            <a th:href="@{/user/person_message/(username=${person[0]})}">
                                <img th:src="@{/media/{logo}(logo=${img.ulogo})}" style="width:28px;height:28px;border-radius:50%;object-fit:cover" alt="">
                                <span th:text="${img.uname}"></span>
                            </a>
                        </li>
                    </th:block>
                </th:block>
                <li th:if="${persons == null or #lists.isEmpty(persons)}" style="text-align:center;color:var(--gray-400);border:none">暂无消息</li>
            </ul>
        </div>
        <div class="right_content clearfix">
            <div class="site_con">
                <p style="font-size:13px;color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">消息内容</p>
                <th:block th:each="information : ${informations}">
                    <div class="form_group1" th:if="${information.cusername == username}">
                        <div>
                            <img th:src="@{/media/{logo}(logo=${logo.ulogo})}" style="width:30px;height:30px;border-radius:50%;object-fit:cover" alt="">
                            <h6><span th:text="${information.cusername}"></span>:<span th:text="${information.ctitle}"></span>,<span th:text="${information.ccontentChart}"></span></h6>
                        </div>
                        <p th:text="${information.datePublish}"></p>
                    </div>
                    <div class="form_group3" th:if="${information.cusername1 == username and information.cusername == user.uname}">
                        <div>
                            <img th:src="@{/media/{logo}(logo=${user.ulogo})}" style="width:30px;height:30px;border-radius:50%;object-fit:cover" alt="">
                            <h6><span th:text="${information.ccontentChart}"></span>:<span th:text="${information.cusername}"></span></h6>
                        </div>
                        <p th:text="${information.datePublish}"></p>
                    </div>
                </th:block>
            </div>
            <form th:action="@{/user/person_message/(username=${username})}" method="post">
                <input class="nr" type="text" name="title" required="" placeholder="输入消息...">
                <input class="sub" type="submit" value="发送">
            </form>
        </div>
    </div>
    <div th:if="${message}"><script th:inline="javascript">alert(/*[[${message}]]*/ '');</script></div>
</th:block>
</body>
</html>
