<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<body>
<th:block layout:fragment="center_body">
    <div class="main_con clearfix">
        <div class="left_menu_con clearfix">
            <h3>USER CENTER</h3>
            <div class="information clearfix">
                <a th:href="@{/user/myself_information/}"><img th:src="@{/media/{f}(f=${user.ulogo})}" alt=""></a>
            </div>
            <ul>
                <li><a th:href="@{/user/info/}">个人信息</a></li>
                <li><a th:href="@{/user/publishers/}">发布商品</a></li>
                <li><a th:href="@{/user/changeInformation/}">修改资料</a></li>
                <li><a th:href="@{/user/changeInPwd/}">修改密码</a></li>
                <li><a th:href="@{/user/order/1}">全部订单</a></li>
                <li><a th:href="@{/user/site/}" class="active">收货地址</a></li>
            </ul>
        </div>
        <div class="right_content clearfix">
            <h3 class="common_title2">当前地址</h3>
            <div class="site_con1">
                <dl>
                    <dt>收件人：<span th:text="${user.ushou}"></span></dt>
                    <dt>电话：<span th:text="${user.uphone}"></span></dt>
                    <dt>地址：<span th:text="${user.uaddress}"></span></dt>
                </dl>
            </div>
            <h3 class="common_title2">编辑地址</h3>
            <div class="site_con">
                <form th:action="@{/user/site/}" method="post">
                    <div class="form_group"><label>收件人：</label><input type="text" name="ushou" th:value="${user.ushou}"></div>
                    <div class="form_group"><label>手机：</label><input type="text" name="uphone" th:value="${user.uphone}"></div>
                    <div class="form_group"><label>邮编：</label><input type="text" name="uyoubian" th:value="${user.uyoubian}"></div>
                    <div class="form_group form_group2"><label>详细地址：</label><textarea class="site_area" name="uaddress" th:text="${user.uaddress}"></textarea></div>
                    <input type="submit" name="" value="保存" class="info_submit">
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
