<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
<th:block layout:fragment="head">
    <script>
    $(function () {
        $('.col07').each(function () {
            count = $(this).prev().text();
            price = $(this).prev().prev().text();
            $(this).html(parseFloat(count,2)*parseFloat(price,2)+'元')
        })
    })
    </script>
</th:block>
</head>
<body>
<th:block layout:fragment="center_body">

    <h3 class="common_title">确认收货地址</h3>

    <div class="common_list_con clearfix">
        <dl>
            <dt>寄送到：</dt>
            <span><input type="radio" name="" checked="checked" style="accent-color:var(--black)"></span>
            当前地址：<span class="user_info_check" th:text="${user.uaddress}"></span>
            收件人：<span class="user_info_check" th:text="${user.ushou}"></span>
            电话：<span class="user_info_check" th:text="${user.uphone}"></span>
        </dl>
        <a th:href="@{/user/site/}" class="edit_site">编辑收货地址</a>
    </div>

    <h3 class="common_title">支付方式</h3>
    <div class="common_list_con clearfix">
        <div class="pay_style_con clearfix">
            <input type="radio" name="pay_style" checked style="accent-color:var(--black)">
            <label class="cash">货到付款</label>
            <input type="radio" name="pay_style" style="accent-color:var(--black)">
            <label class="weixin">微信支付</label>
            <input type="radio" name="pay_style" style="accent-color:var(--black)">
            <label class="zhifubao">支付宝</label>
            <input type="radio" name="pay_style" style="accent-color:var(--black)">
            <label class="bank">银行卡支付</label>
        </div>
    </div>

    <h3 class="common_title">商品列表</h3>

    <div class="common_list_con clearfix">
        <ul class="goods_list_th clearfix">
            <li class="col01">商品名称</li>
            <li class="col02">商品单位</li>
            <li class="col03">商品价格</li>
            <li class="col04">数量</li>
            <li class="col05">小计</li>
        </ul>
        <ul class="goods_list_td clearfix" th:each="cart,iterStat : ${carts}" th:id="${cart.id}">
            <li class="col01" th:text="${iterStat.count}"></li>
            <li class="col02"><img th:src="@{/media/{pic}(pic=${cart.goods.gpic})}"></li>
            <li class="col03" th:text="${cart.goods.gtitle}"></li>
            <li class="col04" th:text="${cart.goods.gunit}"></li>
            <li class="col05" th:text="${cart.goods.gprice}"></li>
            <li class="col06" th:text="${cart.count}"></li>
            <li class="col07">25.80元</li>
        </ul>
    </div>

    <h3 class="common_title">总金额结算</h3>

    <div class="common_list_con clearfix">
        <div class="settle_con">
            <div class="total_goods_count">共<em th:text="${#lists.size(carts)}"></em>件商品，总金额<b th:text="${total_price}"></b></div>
            <div class="transit">运费：<b><span th:text="${trans_cost}"></span>元</b></div>
            <div class="total_pay">实付款：<b th:text="${total_trans_price}"></b></div>
        </div>
    </div>

    <div class="order_submit clearfix">
        <a href="javascript:;" id="order_btn">提交订单</a>
    </div>

    <div class="popup_con">
        <div class="popup">
            <p>订单提交成功！</p>
        </div>
        <div class="mask"></div>
    </div>

    <script th:inline="javascript">
        var totalTransPrice = [[${total_trans_price}]];
        $('#order_btn').click(function() {
            var number = 0;
            $('.user_info_check').each(function () {
                text = $(this).text();
                if (text == ''){
                    number = 1;
                }
            });
            if (number == 1){
                alert('请填写正确的收货地址');
                window.location.href = '/user/site/';
                return;
            }
            cartids = '';
            $('.goods_list_td').each(function () {
               cartids = cartids + $(this).attr('id') +','
            });
            cartids = cartids.substring(0,cartids.length-1);
            total = totalTransPrice;
            data = {
                    'cart_ids':cartids,
                    'total':total
            };
            $.ajax({
                url: '/order/push/',
                type: 'POST',
                data: data,
                success: function (data) {
                    if (data.ok == 1){
                        localStorage.setItem('order_finish',2);
                        $('.popup_con').fadeIn('fast', function() {
                            setTimeout(function(){
                                $('.popup_con').fadeOut('fast',function(){
                                    window.location.href = '/user/order/1';
                                });
                            },1000)
                        });
                    }
                    else {
                        alert('订单提交失败')
                    }
                }
            });
        });
    </script>
</th:block>
</body>
</html>
