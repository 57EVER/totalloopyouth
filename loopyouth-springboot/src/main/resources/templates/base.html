<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base_foot}">
<head>
    <th:block layout:fragment="head"></th:block>
    <th:block layout:fragment="script"></th:block>
</head>
<body>
<th:block layout:fragment="body">
    <div class="header_con" id="header_con">
		<div class="header">
			<div class="welcome fl">欢迎来到循环青年!</div>
			<div class="fr">
                <th:block th:if="${session.user_name != null}">
				<div class="login_btn fl">
                    <img class="img-circle" align="center" th:src="@{/media/{logo}(logo=${user?.ulogo})}" alt="头像"/>
                    <font color="#ff4500" th:text="${session.user_name}"></font>
				</div>
                <div class="login_btn fl">
                    <span>|</span>
                    <em><a th:href="@{/user/logout/}">退出</a></em>
				</div>
                </th:block>
                <th:block th:unless="${session.user_name != null}">
				<div class="login_btn fl">
					<a th:href="@{/user/login/}">登录</a>
					<span>|</span>
					<a th:href="@{/user/register/}">注册</a>
				</div>
                </th:block>
				<div class="user_link fl">
					<span>|</span>
                    <a th:href="@{/}">首页</a>
                    <span>|</span>
					<a th:href="@{/user/info/}">用户中心</a>
                    <span>|</span>
					<a th:href="@{/user/message/}">消息中心</a>
				</div>
			</div>
		</div>
	</div>

    <div class="search_bar clearfix">
		<div class="search_con fl">
             <script>
                $(function () {
                    $('.input_btn').click(function () {
                        q = $('.input_text').val();
                        if(q==""){
                        alert("请输入搜索内容");
                        }
                        else{
                            location.href = '/search?q='+q+'&pindex=1'
                        }
                    })
                })
            </script>
			<input type="text" class="input_text fl" name="q" placeholder="搜索商品">
			<input type="button" class="input_btn fr" name="" value="搜索">
		</div>

        <div class="guest_cart fr" th:if="${guest_cart == 1}">
            <a th:href="@{/cart/}" class="cart_name fl">购物车</a>
            <div class="goods_count fl" id="show_count" th:text="${cart_num}">0</div>
        </div>
        <div class="guest_cart fr" th:unless="${guest_cart == 1}">
            <a th:href="@{/cart/}" class="cart_name fl">购物车</a>
            <div class="goods_count fl" id="show_count">0</div>
        </div>
	</div>
<th:block layout:fragment="content"></th:block>
<th:block layout:fragment="center_body"></th:block>
</th:block>
</body>
</html>
