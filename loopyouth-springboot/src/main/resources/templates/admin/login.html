<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台登录</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft Yahei', sans-serif;
            background: #f5f5f4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login_box {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 48px 40px;
            width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }
        .login_title {
            text-align: center;
            margin-bottom: 32px;
        }
        .login_title h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1c1917;
            letter-spacing: -0.5px;
        }
        .login_title p {
            font-size: 13px;
            color: #78716c;
            margin-top: 6px;
        }
        .form_group {
            margin-bottom: 18px;
        }
        .form_group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #44403c;
            margin-bottom: 6px;
        }
        .form_group input {
            width: 100%;
            height: 42px;
            padding: 0 14px;
            border: 1px solid #e5e5e5;
            border-radius: 7px;
            font-size: 14px;
            outline: none;
            color: #1c1917;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form_group input:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 2px #dcfce7;
        }
        .error_msg {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            border-radius: 7px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .submit_btn {
            width: 100%;
            height: 44px;
            background: #16a34a;
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit_btn:hover {
            background: #15803d;
        }
        .back_link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #78716c;
        }
        .back_link a {
            color: #16a34a;
            text-decoration: none;
        }
        .back_link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login_box">
    <div class="login_title">
        <h1>&#9881; 管理后台</h1>
        <p>请使用管理员账号登录</p>
    </div>

    <div class="error_msg" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/admin/login}">
        <div class="form_group">
            <label>用户名</label>
            <input type="text" name="username" autocomplete="username" placeholder="管理员用户名" required>
        </div>
        <div class="form_group">
            <label>密码</label>
            <input type="password" name="password" autocomplete="current-password" placeholder="密码" required>
        </div>
        <button type="submit" class="submit_btn">登录</button>
    </form>

    <div class="back_link">
        <a th:href="@{/}">← 返回前台</a>
    </div>
</div>
</body>
</html>
