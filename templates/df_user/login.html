{% extends 'base_foot.html' %}

{% block head %}
<script>
    $(function () {
        name_error = false;
        pwd_error = false;
        vc_error = false;

        if({{ error_name }}==1){
            $('.user_error').html('用户名错误').show();
        }
        if({{ error_pwd }}==1){
            $('.pwd_error').html('密码错误').show();
        }
        if({{ error_vc }}==1){
            $('.vc_error').html('验证码错误').show();
        }
        $('.name_input').blur(function () {
            if($('.name_input').val().length=0){
                $('.user_error').html('请填写用户名').show();
                name_error = false;
            }else{
                $('.user_error').hide();
                name_error = true;
            }
        });
        $('.pass_input').blur(function () {
            if($('.pass_input').val().length=0){
                $('.pwd_error').html('请输入密码').show();
                pwd_error = false;
            }else{
                $('.pwd_error').hide();
                pwd_error = true;
            }
        });
        $('.vc_input').blur(function () {
            if($('.vc_input').val().length=0){
                $('.vc_error').html('请输入验证码').show();
                vc_error = false;
            }else{
                $('.vc_error').hide();
                vc_error = true;
            }
        });
    })
</script>
{% endblock head %}

{% block body %}
	<div class="new_login_container">
		<div class="login_split_left">
			<img src="/static/images/image copy.png" alt="循环青年">
		</div>

		<div class="login_split_right">
			<div class="back_home_link">
				<a href="{% url "df_goods:index" %}">← 返回首页</a>
			</div>

			<div class="login_form_container">
				<div class="login_header_text">
					<h1>用户登录</h1>
					<a href="{% url "df_user:register" %}" class="register_link_top">立即注册</a>
				</div>

				<form action="{% url "df_user:login_handle" %}" method="post" class="new_login_form">
					{% csrf_token %}

					<div class="input_group">
						<input type="text" name="username" class="name_input" value="{{ username }}" placeholder="请输入用户名">
						<div class="user_error">输入错误</div>
					</div>

					<div class="input_group">
						<input type="password" name="pwd" class="pass_input" value="{{ password }}" placeholder="请输入密码">
						<div class="pwd_error">输入错误</div>
					</div>

					<div class="input_group">
						<div class="verify_row">
							<input type="text" name="vc" class="vc_input" placeholder="请输入验证码">
							<div class="verify_code_box">
								<img id='verifycode' src="/user/verifycode/?1" alt="验证码"/>
								<span id='verifycodeChange' title="看不清，换一个">⟳</span>
							</div>
						</div>
						<div class="vc_error">输入错误</div>
					</div>

					<div class="checkbox_group">
						<label>
							<input type="checkbox" name="jizhu" value="1" checked="checked">
							<span>记住用户名</span>
						</label>
					</div>

					<button type="submit" class="submit_button">登录</button>
				</form>
			</div>
		</div>
	</div>
<script type="text/javascript">
    $(function(){
        $('#verifycodeChange').css('cursor','pointer').click(function() {
            $('#verifycode').attr('src',$('#verifycode').attr('src')+1)
        });
    });
</script>
{#  弹窗提示  #}
    {% if messages %}
    <script>
        {% for msg in messages %}
            alert('{{ msg.message }}');
        {% endfor %}
    </script>
    {% endif %}
{% endblock body %}
